name: Labo MIKHMON ONLINE

on:
  workflow_dispatch:

jobs:
  test-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wireguard wireguard-tools apache2 php php-mysql php-curl php-xml php-mbstring unzip git iptables curl

      - name: Start Apache
        run: |
          sudo systemctl enable apache2
          sudo systemctl start apache2

      - name: Install Mikhmon
        run: |
          sudo mkdir -p /var/www/html/mikhmon
          sudo wget -q https://codeload.github.com/laksa19/mikhmonv3/zip/master -O /tmp/mikhmonv3-master.zip
          sudo unzip /tmp/mikhmonv3-master.zip -d /tmp/
          sudo cp -r /tmp/mikhmonv3-master/* /var/www/html/mikhmon/
          sudo chown -R www-data:www-data /var/www/html/mikhmon
          sudo chmod -R 755 /var/www/html/mikhmon

      - name: Configure WireGuard
        run: |
          sudo mkdir -p /etc/wireguard
          wg genkey | sudo tee /etc/wireguard/server_private.key > /dev/null
          sudo cat /etc/wireguard/server_private.key | wg pubkey | sudo tee /etc/wireguard/server_public.key > /dev/null
          SERVER_PRIV=$(sudo cat /etc/wireguard/server_private.key)
          SERVER_PUB=$(sudo cat /etc/wireguard/server_public.key)
          echo "SERVER_PUBLIC_KEY=$SERVER_PUB" >> $GITHUB_ENV
          sudo bash -c "cat > /etc/wireguard/wg0.conf <<EOF
          [Interface]
          Address = 10.99.99.1/24
          ListenPort = 51820
          PrivateKey = ${SERVER_PRIV}
          PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

          # Autoriser ton MikroTik
          [Peer]
          PublicKey = I1AJItplZSU6NRk2U61AvneTNOCk58pvnXqLbOZeFTQ=
          AllowedIPs = 10.99.99.2/32
          EOF"
          sudo wg-quick up wg0
          sudo wg show

      - name: Enable IP Forwarding
        run: |
          echo "net.ipv4.ip_forward=1" | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p

      - name: Show Info
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "==========================================="
          echo "🌐 LABO MIKHMON ONLINE PRÊT"
          echo "==========================================="
          echo "IP Publique        : $PUBLIC_IP"
          echo "Clé publique WG    : ${{ env.SERVER_PUBLIC_KEY }}"
          echo "Interface WireGuard: 10.99.99.1/24"
          echo "Port WireGuard     : 51820"
          echo "Mikhmon URL        : http://$PUBLIC_IP/mikhmon"
          echo "==========================================="

      - name: Keep Alive
        run: |
          while true; do
            sleep 300
            echo "[$(date)] Labo toujours actif - IP: $(curl -s ifconfig.me)"
          done
