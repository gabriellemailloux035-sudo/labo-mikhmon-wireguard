name: Labo MIKHMON ONLINE

on:
  workflow_dispatch:

jobs:
  test-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y apache2 php php-mysql php-curl php-xml php-mbstring unzip git curl

      - name: Start Apache
        run: |
          sudo systemctl enable apache2
          sudo systemctl start apache2

      - name: Install Mikhmon
        run: |
          sudo mkdir -p /var/www/html/mikhmon
          sudo wget -q https://codeload.github.com/laksa19/mikhmonv3/zip/master -O /tmp/mikhmonv3-master.zip
          sudo unzip /tmp/mikhmonv3-master.zip -d /tmp/
          sudo cp -r /tmp/mikhmonv3-master/* /var/www/html/mikhmon/
          sudo chown -R www-data:www-data /var/www/html/mikhmon
          sudo chmod -R 755 /var/www/html/mikhmon

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=labo-mikhmon

      - name: Show Info
        run: |
          TAILSCALE_IP=$(tailscale ip -4)
          echo "==========================================="
          echo "🌐 LABO MIKHMON ONLINE PRÊT"
          echo "==========================================="
          echo "IP Tailscale du labo : $TAILSCALE_IP"
          echo "Mikhmon URL          : http://$TAILSCALE_IP/mikhmon"
          echo "==========================================="

      - name: Keep Alive
        run: |
          while true; do
            sleep 300
            echo "[$(date)] Labo toujours actif - IP Tailscale: $(tailscale ip -4)"
          done
